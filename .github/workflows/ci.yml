name: Continuous Integration

on:
  push:
    branches:
      - main
      - "renovate/**"
  pull_request:
    branches:
      - main

jobs:
  pre_job:
    permissions:
      actions: write
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      should_skip: ${{ steps.skip_check.outputs.should_skip }}
    steps:
      - id: skip_check
        uses: fkirc/skip-duplicate-actions@f75f66ce1886f00957d99748a42c724f4330bdcf # v5.3.1
        with:
          concurrent_skipping: same_content
          do_not_skip: '["pull_request", "release", "workflow_dispatch", "schedule"]'
          skip_after_successful_duplicate: true
  ci:
    name: Tests and code quality
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: pre_job
    if: needs.pre_job.outputs.should_skip != 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        env:
          MISE_AQUA_BAKED_REGISTRY: false
        with:
          experimental: true
      - name: Ensure Rust toolchain and components are installed
        run: mise install --force rust
      - name: Run CI task
        env:
          GITHUB_TOKEN: ${{ github.token }}
          HK_FAIL_FAST: true
          HK_STATE_DIR: ${{ runner.temp }}/hk
        run: mise run ci
      - name: Upload lint task output
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: failure()
        with:
          name: lint-task-results
          path: ${{ runner.temp }}/hk/output.log
          archive: false
      - name: Upload integration tests results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: integration-tests-results
          path: |
            integration/__image_snapshots__/*.diff.png
            integration/videos/*.webm
