name: Continuous Integration

on:
  push:
    branches:
      - main
      - "renovate/**"
  pull_request:
    branches:
      - main

jobs:
  pre_job:
    permissions:
      actions: write
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      should_skip: ${{ steps.skip_check.outputs.should_skip }}
    steps:
      - id: skip_check
        uses: fkirc/skip-duplicate-actions@f75f66ce1886f00957d99748a42c724f4330bdcf # v5.3.1
        with:
          concurrent_skipping: same_content
          do_not_skip: '["pull_request", "release", "workflow_dispatch", "schedule"]'
          skip_after_successful_duplicate: true
  ci:
    name: Tests and code quality
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: pre_job
    if: needs.pre_job.outputs.should_skip != 'true'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          experimental: true
      - name: Get Deno cache directory
        id: deno-cache-dir
        run: echo "dir=$(deno info --json | jq --raw-output '.denoDir')" >> "${GITHUB_OUTPUT}"
      - name: Setup Deno cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ steps.deno-cache-dir.outputs.dir }}
          key: ${{ runner.os }}-deno-${{ hashFiles('**/deno.lock') }}
      - name: Get Chrome version used by Puppeteer
        id: chrome-version
        run: |
          script=$(cat <<'EOF'
          import { PUPPETEER_REVISIONS } from "puppeteer"
          const chromeVersion = PUPPETEER_REVISIONS.chrome
          if (!chromeVersion) throw new Error("undefined chrome version")
          console.log(chromeVersion)
          EOF
          )
          echo "version=$(deno eval "${script}")" >> "${GITHUB_OUTPUT}"
      - name: Setup Chrome installation cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/puppeteer/chrome
          key: ${{ runner.os }}-chrome-${{ steps.chrome-version.outputs.version }}
      - name: Install Chrome for Puppeteer
        run: deno x puppeteer browsers install chrome
      - name: Ensure Rust toolchain and components are installed
        run: mise install --force rust
      - name: Run CI task
        env:
          GITHUB_TOKEN: ${{ github.token }}
          HK_FAIL_FAST: true
          HK_STATE_DIR: ${{ runner.temp }}/hk
        run: mise run ci
      - name: Upload lint task output
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: failure()
        with:
          name: lint-task-results
          path: ${{ runner.temp }}/hk/output.log
          archive: false
      - name: Upload integration tests results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: integration-tests-results
          path: |
            integration/__image_snapshots__/*.diff.png
            integration/videos/*.webm
