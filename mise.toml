[tools]
deno = "2.9.2"
tombi = "latest"
hk = "latest"
pkl = "latest"
"aqua:betterleaks/betterleaks" = "latest"
hadolint = "latest"
editorconfig-checker = "latest"
rumdl = "latest"
typos = "latest"
ghalint = "latest"
zizmor = "latest"
pinact = "latest"
actionlint = "latest"

[tools.rust]
version = "1.96.1"
components = "rust-analyzer"
profile = "default"
targets = "wasm32-unknown-unknown"

[settings]
minimum_release_age = "7d"

[hooks]
enter = "mise outdated --local --silent"

[tasks.build]
description = "Build the library"
run = "cargo xtask build-deno"

[tasks.build.tools]
"aqua:WebAssembly/binaryen" = "latest"
biome = "latest"

[tasks."test:unit"]
description = "Run Rust unit tests"
run = "cargo test"

[tasks."test:integration"]
description = "Run Deno integration tests"
depends = ["build"]
usage = '''
  flag "--update-snapshot" help="Update the visual tests snapshot"
'''
env.TZ = "UTC"
run = "deno test -A -- ${usage_update_snapshot:+--update-snapshot}"

[tasks."test:integration".tools]
ffmpeg = "latest"

[tasks.lint]
description = "Run hk lints"
run = "hk check --all"

[tasks.ci]
description = "Run CI related tasks"
depends = ["lint", "test:*"]
run = "echo 'CI completed successfully'"

[tasks.publish]
description = "Publish the package"
depends = ["build"]
run = "deno publish"
